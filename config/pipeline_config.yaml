# ============================================================
# Fraud Detection Pipeline — Configuration
# Author: Pramod Vishnumolakala
# ============================================================

pipeline:
  name: fraud-detection-pipeline
  environment: production
  region: us-east-1
  owner: pramod.vishnumolakala

kinesis:
  stream_name: fraud-detection-transactions
  shard_count: 4
  retention_hours: 24
  producer:
    rate_per_second: 200
    batch_size: 500

fraud_detection:
  score_threshold: 60
  rules:
    high_amount_threshold: 5000.0
    velocity_window_seconds: 300
    velocity_max_transactions: 10
    velocity_max_amount: 10000.0
    geo_distance_km: 500
    high_risk_countries: [BR, MX, IN, RU, NG]
    high_risk_categories: [atm, online_retail, travel, money_transfer]

redshift:
  cluster_identifier: fraud-detection-dw
  database: frauddb
  schema: fraud_features
  table: transaction_features
  node_type: ra3.4xlarge
  number_of_nodes: 2

glue:
  job_name: fraud-detection-etl
  glue_version: "4.0"
  number_of_workers: 10
  worker_type: G.1X
  timeout_minutes: 60

alerting:
  sns_topic: arn:aws:sns:us-east-1:123456789:fraud-alerts
  email_from: fraud-alerts@pramod-dataplatform.com
  email_to:
    - fraud-ops@pramod-dataplatform.com

compliance:
  pci_dss: true
  gdpr: true
  kms_key_alias: alias/fraud-detection-pipeline
  cloudtrail_enabled: true

monitoring:
  cloudwatch_namespace: FraudDetectionPipeline
  sla_threshold_seconds: 60
  iterator_age_alarm_ms: 30000
